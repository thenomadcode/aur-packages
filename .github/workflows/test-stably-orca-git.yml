name: test-stably-orca-git

on:
  schedule:
    # Weekly Sunday 04:23 UTC. -git packages don't change pkgver on a schedule;
    # this job verifies the recipe still builds against upstream HEAD.
    - cron: '23 4 * * 0'
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Push to AUR even if no PKGBUILD changes are detected (use for initial publish).'
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - 'stably-orca-git/**'
      - '.github/workflows/test-stably-orca-git.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: test-stably-orca-git
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PKG_DIR: stably-orca-git
    outputs:
      rc: ${{ steps.build.outputs.rc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Arch container
        id: build
        run: |
          set +e
          docker run --rm \
            -v "${PWD}:/work" \
            -w "/work/${PKG_DIR}" \
            archlinux:base-devel \
            bash -euxc '
              HOST_UID="$(stat -c %u /work)"
              HOST_GID="$(stat -c %g /work)"
              # Restore host ownership on exit so post-job steps can touch .git.
              trap "chown -R ${HOST_UID}:${HOST_GID} /work" EXIT
              pacman-key --init >/dev/null 2>&1 || true
              pacman -Syu --noconfirm --needed pacman-contrib git fuse2 sudo >/dev/null
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
              chmod 0440 /etc/sudoers.d/builder
              chown -R builder:builder /work
              sudo -u builder bash -euxc "
                cd /work/'"${PKG_DIR}"'
                makepkg -s --noconfirm
                makepkg --printsrcinfo > .SRCINFO.generated
                if ! diff -u .SRCINFO .SRCINFO.generated; then
                  echo \"::warning::.SRCINFO drift detected. Regenerate locally.\"
                fi
              "
            '
          rc=$?
          echo "rc=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Open issue on scheduled build failure
        if: steps.build.outputs.rc != '0' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `stably-orca-git: scheduled build failed`;
            const body = [
              `Weekly build of \`stably-orca-git\` against upstream HEAD failed.`,
              ``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Likely an upstream build change. Review and update the PKGBUILD.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure', 'stably-orca-git'],
            });

      - name: Fail job if build failed
        if: steps.build.outputs.rc != '0'
        run: exit 1

  publish:
    # Only runs on push-to-main (after build passes) or explicit dispatch.
    # Scheduled + PR builds never publish.
    needs: build
    if: >-
      needs.build.outputs.rc == '0' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AUR secret configured
        id: aur_check
        env:
          KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          USERNAME: ${{ vars.AUR_USERNAME }}
        run: |
          if [[ -n "${KEY}" && -n "${USERNAME}" ]]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::AUR_SSH_PRIVATE_KEY secret or AUR_USERNAME variable missing — skipping AUR publish."
          fi

      - name: Publish to AUR
        if: steps.aur_check.outputs.configured == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: stably-orca-git
          pkgbuild: stably-orca-git/PKGBUILD
          assets: |
            stably-orca-git/stably-orca.sh
            stably-orca-git/stably-orca.desktop
          commit_username: ${{ vars.AUR_USERNAME }}
          commit_email: thenomadcodeinfo@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "stably-orca-git: update PKGBUILD (${{ github.sha }})"
          allow_empty_commits: false
          force_push: false
          ssh_keyscan_types: 'rsa,ecdsa,ed25519'
